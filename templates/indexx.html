<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bigmart Sales Prediction</title>

  <!-- ✅ FIXED: Flask static path -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styless.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- Navbar -->
<header id="navbar" style="display: none;">
  <h1 class="logo">🛒Big-Mart Sales Predictor</h1>
  <div class="container">
    <nav>
      <ul class="nav-links">
        <li><a href="#about-section" id="home-link"><i class="fas fa-home"></i>Home</a></li>
        <li><a href="#prediction-form-section" id="predict-link"><i class="fas fa-chart-line"></i>Predict</a></li>
        <li><a href="#" id="products-link"><i class="fas fa-box-open"></i>Products</a></li>
        <li><a href="#" id="saved-link"><i class="fas fa-save"></i>Save</a></li>
        <li><a href="#" id="logout-link"><i class="fas fa-sign-out-alt"></i>Logout</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- Login -->
<section class="card-container single-card-center">
  <h1 id="login-heading" class="login-title">🛒 Big-Mart Sales Predictor</h1>

  <button id="register-button" class="register-button">Sign Up</button>

  <div class="card right-card" id="login-card">
    <h2 id="form-heading">Login</h2>

    <form id="login-form">
      <input type="text" id="username" required>
      <input type="password" id="password" required>
      <button type="submit">Login</button>
    </form>

    <form id="register-form" style="display:none;">
      <input type="text" id="reg-username" required>
      <input type="password" id="reg-password" required>
      <button type="submit">Sign Up</button>
    </form>
  </div>
</section>

<!-- About -->
<div id="about-section" style="display:none; text-align:center; margin-top:50px;">
  <h2>About</h2>

  <!-- ✅ FIXED IMAGE PATHS -->
  <img src="{{ url_for('static', filename='images/with.png') }}" width="450">
  <img src="{{ url_for('static', filename='images/out.png') }}" width="450">

</div>

<!-- Prediction -->
<section id="prediction-form-section" style="display:none;">
  <h2>🛒 Predict Sales</h2>

  <form id="prediction-form">
    <input type="text" id="Item_Identifier" required>
    <input type="number" id="Item_Weight" required>

    <select id="Item_Fat_Content">
      <option>Low Fat</option>
      <option>Regular</option>
    </select>

    <input type="number" id="Item_Visibility" required>
    <input type="text" id="Item_Type" required>
    <input type="number" id="Item_MRP" required>

    <input type="text" id="Outlet_Identifier" required>
    <input type="number" id="Outlet_Establishment_Year" required>

    <input type="text" id="Outlet_Size" required>
    <input type="text" id="Outlet_Location_Type" required>
    <input type="text" id="Outlet_Type" required>

    <button type="submit">Predict</button>
  </form>

  <!-- ✅ FIXED RESULT ID -->
  <div id="result"></div>
</section>

<!-- Footer -->
<footer id="footer" style="display:none;">
  <p>© Big-Mart Sales Predictor</p>
</footer>

<!-- ✅ CLEAN SINGLE SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  // LOGIN
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const res = await fetch("/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        username: username.value,
        password: password.value
      })
    });

    const data = await res.json();

    if (data.message === "Login successful") {
      login-card.style.display = "none";
      navbar.style.display = "block";
      about-section.style.display = "block";
    }
  });

  // NAV
  predict-link.onclick = () => {
    about-section.style.display = "none";
    prediction-form-section.style.display = "block";
  };

  home-link.onclick = () => {
    prediction-form-section.style.display = "none";
    about-section.style.display = "block";
  };

  // PREDICT
  prediction-form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const res = await fetch("/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        Item_Identifier: Item_Identifier.value,
        Item_Weight: Item_Weight.value,
        Item_Fat_Content: Item_Fat_Content.value,
        Item_Visibility: Item_Visibility.value,
        Item_Type: Item_Type.value,
        Item_MRP: Item_MRP.value,
        Outlet_Identifier: Outlet_Identifier.value,
        Outlet_Establishment_Year: Outlet_Establishment_Year.value,
        Outlet_Size: Outlet_Size.value,
        Outlet_Location_Type: Outlet_Location_Type.value,
        Outlet_Type: Outlet_Type.value
      })
    });

    const data = await res.json();

    // ✅ FIXED RESULT DISPLAY
    result.innerText = data.error
      ? data.error
      : "₹ " + data.Item_Outlet_Sales;
  });

});
</script>

</body>
</html>
